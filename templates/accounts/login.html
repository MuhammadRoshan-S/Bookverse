{% extends 'base.html' %}

{% block title %}Login — Bookverse{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <p class="auth-logo">BOOKVERSE</p>
    <p class="auth-subtitle">Sign in to your account</p>

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">USERNAME</label>
        <input type="text" name="username" id="id_username" class="form-input" autofocus />
      </div>
      <div class="form-group">
        <label for="id_password">PASSWORD</label>
        <input type="password" name="password" id="id_password" class="form-input" />
      </div>
      {% for error in form.non_field_errors %}
      <p style="color:var(--red); font-size:0.82rem; margin-bottom:12px">{{ error }}</p>
      {% endfor %}
      <div class="auth-actions">
        <button type="submit" class="btn-auth">SIGN IN →</button>
      </div>
    </form>
    <p class="auth-alt">New to Bookverse? <a href="{% url 'register' %}">Create account</a></p>
  </div>
</div>
{% endblock %}
